<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuBot — AI Chatbot</title>
  <link rel="stylesheet" id="themeStylesheet" href="/static/style.css" />
</head>
<body>
<div class="chat-container">
  <div class="key-banner" id="keyBanner">
    ⚠️ API key daalo file mein — <a href="https://console.anthropic.com" target="_blank">yahan se lo (free)</a>
  </div>
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h2>RuBot</h2>
      <p><span class="online-dot"></span> Online — AI Powered</p>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg-row bot">
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">Hey! Main hoon <b>RuBot</b> 🤖<br><br>Tumhara AI dost — bilkul ChatGPT jaisa! Kuch bhi poocho, main hoon na 😊</div>
        <div class="msg-time">abhi</div>
      </div>
    </div>
  </div>
  <div class="quick-area">
    <button class="qbtn" onclick="quick('Hello yaar!')">👋 Hello</button>
    <button class="qbtn" onclick="quick('Ek mazedaar joke sunao')">😂 Joke</button>
    <button class="qbtn" onclick="quick('Mera mood off hai, kuch batao')">😔 Mood off</button>
    <button class="qbtn" onclick="quick('Tum kaun ho?')">🤖 Kaun ho?</button>
    <button class="qbtn" onclick="quick('Aaj ka koi interesting fact batao')">💡 Fun fact</button>
    <button class="qbtn" onclick="quick('Mujhe motivate karo')">🔥 Motivate</button>
  </div>
  <div class="input-area">
    <textarea id="userInput" placeholder="Kuch bhi likho..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>

const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:5000' : window.location.origin;
if (window.location.protocol === 'file:') {
  const styleLink = document.getElementById('themeStylesheet');
  if (styleLink) {
    styleLink.href = 'http://localhost:5000/static/style.css';
  }
}

const SYSTEM_PROMPT = `Tu ek friendly Hinglish AI chatbot hai jiska naam RuBot hai.
Tu hamesha Hinglish mein baat karta hai — Hindi aur English naturally mix karke, jaise close dost karte hain.
Tu helpful, funny, warm aur caring hai.
Natural aur conversational jawab deta hai — kabhi zyada formal mat ban.
Thodi emojis use kar — zyada nahi, sirf jahan naturally fit ho.
Chhote paragraphs mein likhta hai. Kabhi kabhi follow-up question poochh.`;

let history = [];
let isTyping = false;

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function getTime() {
  return new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function quick(text) { input.value = text; sendMessage(); }

function appendMessage(text, sender) {
  const row = document.createElement("div");
  row.className = `msg-row ${sender}`;
  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = sender === "bot" ? "🤖" : "🧑";
  const wrap = document.createElement("div");
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text.replace(/\n/g, "<br>");
  const time = document.createElement("div");
  time.className = "msg-time";
  time.textContent = getTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  row.appendChild(avatar);
  row.appendChild(wrap);
  messagesDiv.appendChild(row);
  scrollDown();
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot"; row.id = "typingRow";
  const avatar = document.createElement("div");
  avatar.className = "msg-avatar"; avatar.textContent = "🤖";
  const tb = document.createElement("div");
  tb.className = "typing-bubble";
  tb.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
  row.appendChild(avatar); row.appendChild(tb);
  messagesDiv.appendChild(row); scrollDown();
}
function removeTyping() { const t = document.getElementById("typingRow"); if(t) t.remove(); }
function scrollDown() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isTyping) return;
  isTyping = true; sendBtn.disabled = true;
  input.value = ""; input.style.height = "auto";
  appendMessage(text, "user");
  history.push({ role: "user", content: text });
  showTyping();
  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text, history })
    });
    const data = await res.json();
    removeTyping();
    if (!res.ok) {
      appendMessage(`Server se response nahi aaya. Error: ${data.error || res.statusText}`, "bot");
    } else if (data.reply) {
      appendMessage(data.reply, "bot");
      history.push({ role: "assistant", content: data.reply });
    } else if (data.error) {
      appendMessage(`Arre yaar! Error: ${data.error}\n\nServer ka API key check karo! 🔑`, "bot");
    }
  } catch (err) {
    removeTyping();
    appendMessage("Internet connection check karo aur dobara try karo! 😅", "bot");
  }
  isTyping = false; sendBtn.disabled = false; input.focus();
}
</script>
</body>
</html>
